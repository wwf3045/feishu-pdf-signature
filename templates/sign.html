<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 在线签字</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            gap: 24px;
            min-height: calc(100vh - 80px);
            overflow: auto;
        }
        /* 横屏：左右排列 */
        @media (orientation: landscape) {
            .container {
                flex-direction: row;
                min-height: calc(100vh - 80px);
                height: auto;
            }
            .pdf-panel {
                flex: 1;
                min-width: 0;
            }
            .signature-panel {
                width: 360px;
                flex-shrink: 0;
                min-height: 400px;
            }
        }
        /* 竖屏：上下排列 */
        @media (orientation: portrait) {
            .container {
                flex-direction: column;
                min-height: calc(100vh - 80px);
            }
            .pdf-panel {
                min-height: 300px;
            }
            .signature-panel {
                min-height: 250px;
            }
        }
        .pdf-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .panel-title {
            font-weight: 600;
            color: #333;
        }
        .pdf-container {
            flex: 1;
            overflow: auto;
            padding: 20px;
            background: #f0f2f5;
            display: block;
            min-height: 0;
        }
        #pdf-canvas {
            display: block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: white;
            cursor: crosshair;
        }
        .pdf-wrapper {
            position: relative;
            display: inline-block;
            width: 600px;
            height: 800px;
        }
        .signature-marker {
            position: absolute;
            border: 2px dashed #667eea;
            background: rgba(102, 126, 234, 0.1);
            cursor: move;
            display: none;
            z-index: 10;
        }
        .signature-marker::after {
            content: '👆 拖动框内区域移动，拖动边角缩放';
            position: absolute;
            top: -28px;
            left: 0;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
        }
        /* 缩放把手 */
        .marker-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #667eea;
            border: 2px solid white;
            border-radius: 50%;
            z-index: 11;
        }
        .marker-handle.n { top: -6px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
        .marker-handle.s { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
        .marker-handle.e { right: -6px; top: 50%; transform: translateY(-50%); cursor: e-resize; }
        .marker-handle.w { left: -6px; top: 50%; transform: translateY(-50%); cursor: w-resize; }
        .marker-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .marker-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .marker-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
        .marker-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        /* 二维码按钮 */
        .qr-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .qr-btn:hover { transform: scale(1.1); }
        /* 二维码弹窗 */
        .qr-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .qr-modal.show { display: flex; }
        .qr-modal-content {
            background: white;
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            max-width: 360px;
        }
        .qr-modal h3 { margin-bottom: 16px; color: #333; }
        #qrcode { display: flex; justify-content: center; margin: 16px 0; }
        .qr-modal p { color: #666; font-size: 14px; margin-top: 12px; }
        .qr-modal .close-btn {
            margin-top: 16px;
            padding: 10px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .signature-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .signature-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .signature-area {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .signature-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }
        .signature-canvas-wrapper {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            background: #fafafa;
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 150px;
            max-height: 400px;
        }
        #signature-canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }
        .signature-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #9ca3af;
            pointer-events: none;
            text-align: center;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .tools {
            display: flex;
            gap: 8px;
            padding: 0 20px 16px;
        }
        .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-btn:hover {
            transform: scale(1.1);
        }
        .color-btn.active {
            border-color: #667eea;
        }
        .size-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        .size-control label {
            font-size: 13px;
            color: #666;
        }
        .size-control input {
            width: 80px;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            margin-top: 16px;
            color: #666;
            font-weight: 500;
        }
        .success {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .success-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        .success h2 {
            color: #1f2937;
            margin-bottom: 8px;
        }
        .success p {
            color: #6b7280;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 20px;
            display: none;
        }
        .page-nav {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .page-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: #f3f4f6;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .page-btn:hover {
            background: #e5e7eb;
        }
        .page-info {
            font-size: 13px;
            color: #666;
            min-width: 60px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>✍️ PDF 在线签字</h1>
    </div>
    
    <div class="container">
        <div class="pdf-panel">
            <div class="panel-header">
                <span class="panel-title">文档预览</span>
                <div class="page-nav" id="page-nav" style="display:none;">
                    <button class="page-btn" id="prev-page">←</button>
                    <span class="page-info" id="page-info">1 / 1</span>
                    <button class="page-btn" id="next-page">→</button>
                </div>
            </div>
            <div class="pdf-container">
                <div class="pdf-wrapper" id="pdf-wrapper">
                    <canvas id="pdf-canvas"></canvas>
                    <div class="signature-marker" id="signature-marker">
                        <div class="marker-handle n"></div>
                        <div class="marker-handle s"></div>
                        <div class="marker-handle e"></div>
                        <div class="marker-handle w"></div>
                        <div class="marker-handle ne"></div>
                        <div class="marker-handle nw"></div>
                        <div class="marker-handle se"></div>
                        <div class="marker-handle sw"></div>
                    </div>
                </div>
            </div>
            <div class="error" id="error"></div>
        </div>
        
        <div class="signature-panel">
            <div class="panel-header">
                <span class="panel-title">手写签字</span>
            </div>
            <div class="signature-area">
                <div class="signature-label">请在下方签字</div>
            <div class="signature-hint" style="font-size:13px;color:#666;margin-bottom:12px;">💡 先在左侧 PDF 上点击选择签字位置</div>
                <div class="signature-canvas-wrapper">
                    <canvas id="signature-canvas"></canvas>
                    <div class="signature-placeholder" id="signature-placeholder">
                        <div style="font-size:48px; margin-bottom:8px;">✍️</div>
                        <div>在此处手写签字</div>
                    </div>
                </div>
            </div>
            <div class="tools">
                <button class="color-btn active" style="background:#000;" data-color="#000000"></button>
                <button class="color-btn" style="background:#1f2937;" data-color="#1f2937"></button>
                <button class="color-btn" style="background:#374151;" data-color="#374151"></button>
                <button class="color-btn" style="background:#0f172a;" data-color="#0f172a"></button>
                <div class="size-control">
                    <label>笔</label>
                    <input type="range" id="brush-size" min="1" max="10" value="3">
                </div>
                <div class="size-control">
                    <label>框</label>
                    <input type="range" id="box-size" min="50" max="300" value="150">
                </div>
            </div>
            <div class="btn-group" style="padding:16px; background:white; flex-shrink: 0;">
                <button class="btn btn-secondary" id="clear-btn">清除</button>
                <button class="btn btn-primary" id="submit-btn" disabled>提交签字</button>
            </div>
        </div>
    </div>
    
    <div class="loading" id="loading" style="display:none;">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">加载中...</div>
    </div>

    <!-- 二维码按钮 -->
    <button class="qr-btn" id="qr-btn" title="手机扫码签字">📱</button>
    
    <!-- 二维码弹窗 -->
    <div class="qr-modal" id="qr-modal">
        <div class="qr-modal-content">
            <h3>📱 手机扫码签字</h3>
            <div id="qrcode"></div>
            <p>打开链接后在手机上签字</p>
            <button class="close-btn" onclick="document.getElementById('qr-modal').classList.remove('show')">关闭</button>
        </div>
    </div>
    
    <div class="success" id="success" style="display:none;">
        <div class="success-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h2>签字完成！</h2>
        <p>您的签字已成功保存</p>
        <a id="download-link" href="#" download style="display:none; margin-top:16px; padding:10px 20px; background:#667eea; color:white; border-radius:8px; text-decoration:none;">📥 下载签字后的PDF</a>
    </div>

    <script>
        const jwtToken = '{{ jwt_token }}';
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 1;
        let pdfBytes = null;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let strokeColor = '#000000';
        let strokeWidth = 3;
        let hasSignature = false;
        let signaturePosition = null;  // {x, y, width, height} 在 PDF 坐标中的位置
        let pageScale = 1;  // PDF 渲染缩放比例
        
        const pdfCanvas = document.getElementById('pdf-canvas');
        const pdfCtx = pdfCanvas.getContext('2d');
        const signatureCanvas = document.getElementById('signature-canvas');
        const signatureCtx = signatureCanvas.getContext('2d');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const success = document.getElementById('success');
        const submitBtn = document.getElementById('submit-btn');
        const signaturePlaceholder = document.getElementById('signature-placeholder');
        const signatureMarker = document.getElementById('signature-marker');
        const pdfWrapper = document.getElementById('pdf-wrapper');
        
        // 设置 PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        async function init() {
            showLoading('加载文档中...');
            try {
                await loadPdfFromServer();
                hideLoading();
            } catch (err) {
                console.error('加载失败，使用演示 PDF:', err);
                // 即使失败也使用演示 PDF
                try {
                    const pdfData = await createDemoPdf();
                    pdfBytes = new Uint8Array(new Uint8Array(pdfData));
                    await renderPdf(pdfBytes);
                    hideLoading();
                } catch (err2) {
                    hideLoading();
                    showError('加载文档失败: ' + err.message);
                    console.error(err2);
                }
            }
        }
        
        async function loadPdfFromServer() {
            try {
                // 先调用后端获取 PDF 信息
                const response = await fetch('/api/pdf-info?token=' + encodeURIComponent(jwtToken));
                const info = await response.json();
                
                let pdfData;
                
                if (info.success && info.pdf_url) {
                    // 从服务端下载 PDF
                    const pdfResponse = await fetch(info.pdf_url);
                    if (pdfResponse.ok) {
                        pdfData = await pdfResponse.arrayBuffer();
                    } else {
                        throw new Error('PDF 文件不存在');
                    }
                } else {
                    // 使用示例 PDF
                    pdfData = await createDemoPdf();
                }
                
                // 创建副本，避免 ArrayBuffer 被释放
                pdfBytes = new Uint8Array(new Uint8Array(pdfData));
                await renderPdf(pdfBytes);
            } catch (err) {
                console.error('加载 PDF 失败:', err);
                throw err;
            }
        }
        
        async function createDemoPdf() {
            // 创建一个简单的示例 PDF（使用英文避免字体编码问题）
            const { PDFDocument, StandardFonts, rgb } = PDFLib;
            const doc = await PDFDocument.create();
            const page = doc.addPage([600, 800]);
            const font = await doc.embedFont(StandardFonts.Helvetica);
            
            page.drawText('PDF Signature Demo', {
                x: 50,
                y: 700,
                size: 24,
                font,
                color: rgb(0, 0, 0),
            });
            
            page.drawText('Please sign below:', {
                x: 50,
                y: 600,
                size: 14,
                font,
                color: rgb(0, 0, 0),
            });
            
            page.drawText('Signature area:', {
                x: 50,
                y: 450,
                size: 12,
                font,
                color: rgb(0.5, 0.5, 0.5),
            });
            
            page.drawRectangle({
                x: 50,
                y: 300,
                width: 300,
                height: 100,
                borderColor: rgb(0.7, 0.7, 0.7),
                borderWidth: 1,
            });
            
            const bytes = await doc.save();
            return bytes.buffer;
        }
        
        async function renderPdf(data) {
            const loadingTask = pdfjsLib.getDocument({ data });
            pdfDoc = await loadingTask.promise;
            totalPages = pdfDoc.numPages;
            
            if (totalPages > 1) {
                document.getElementById('page-nav').style.display = 'flex';
            }
            
            document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
            await renderPage(currentPage);
            
            // 添加 PDF 点击事件
            pdfCanvas.addEventListener('click', onPdfClick);
        }
        
        async function renderPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            pageScale = 1.5;
            const viewport = page.getViewport({ scale: pageScale });
            
            // 获取PDF原始尺寸
            const pdfOriginalWidth = viewport.width / pageScale;
            const pdfOriginalHeight = viewport.height / pageScale;
            
            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;
            
            const renderContext = {
                canvasContext: pdfCtx,
                viewport: viewport,
            };
            
            await page.render(renderContext).promise;
            
            // 如果有保存的位置，使用显示尺寸更新比例后重新显示
            if (signaturePosition && signaturePosition.page === pageNum) {
                // 使用canvas的CSS显示尺寸
                const rect = pdfCanvas.getBoundingClientRect();
                signaturePosition.pdfDisplayWidth = rect.width;
                signaturePosition.pdfDisplayHeight = rect.height;
                updateSignatureMarker();
            } else {
                signatureMarker.style.display = 'none';
            }
        }
        
        function onPdfClick(e) {
            // 防止拖拽标注框时触发
            if (markerDragging) return;
            
            const rect = pdfCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left);
            const y = (e.clientY - rect.top);
            
            // 如果已有位置，保持原来的大小，只更新位置
            const existingWidth = signaturePosition ? signaturePosition.width : 150;
            const existingHeight = signaturePosition ? signaturePosition.height : 50;
            
            // 获取PDF原始尺寸（使用CSS显示尺寸计算）
            const pdfDisplayWidth = rect.width;
            const pdfDisplayHeight = rect.height;
            
            // 转换为 PDF 原始坐标（基于600x800的设计尺寸）
            signaturePosition = {
                x: (x / pdfDisplayWidth) * 600,
                y: (1 - y / pdfDisplayHeight) * 800,  // PDF 坐标原点在左下角
                width: existingWidth,
                height: existingHeight,
                page: currentPage,
                // 保存显示尺寸用于比例计算
                pdfDisplayWidth: pdfDisplayWidth,
                pdfDisplayHeight: pdfDisplayHeight
            };
            
            console.log('onPdfClick - 设置新位置:', signaturePosition, {rect, x, y});
            updateSignatureMarker();
        }
        
        let markerDragging = false;
        let markerResizing = false;
        let resizeHandle = null;
        let markerStartX, markerStartY;
        let markerStartPos;
        
        function updateSignatureMarker() {
            if (!signaturePosition || signaturePosition.page !== currentPage) {
                signatureMarker.style.display = 'none';
                return;
            }
            
            // 使用存储的显示尺寸比例来计算位置
            const rect = pdfCanvas.getBoundingClientRect();
            let screenX, screenY, screenW, screenH;
            
            if (signaturePosition.pdfDisplayWidth && signaturePosition.pdfDisplayHeight) {
                // 基于显示尺寸的比例计算位置
                const ratioX = signaturePosition.x / 600;
                const ratioY = signaturePosition.y / 800;
                const ratioW = signaturePosition.width / 600;
                const ratioH = signaturePosition.height / 800;
                
                screenX = ratioX * rect.width;
                screenY = rect.height - (ratioY * rect.height) - (ratioH * rect.height);
                screenW = ratioW * rect.width;
                screenH = ratioH * rect.height;
            } else {
                // 回退到原来的计算方式
                screenX = signaturePosition.x * pageScale;
                screenY = pdfCanvas.height - (signaturePosition.y + signaturePosition.height) * pageScale;
                screenW = signaturePosition.width * pageScale;
                screenH = signaturePosition.height * pageScale;
            }
            
            signatureMarker.style.display = 'block';
            signatureMarker.style.left = screenX + 'px';
            signatureMarker.style.top = screenY + 'px';
            signatureMarker.style.width = screenW + 'px';
            signatureMarker.style.height = screenH + 'px';
        }
        
        // 初始化显示尺寸
        function initDisplaySize() {
            const rect = pdfCanvas.getBoundingClientRect();
            if (!signaturePosition.pdfDisplayWidth) {
                signaturePosition.pdfDisplayWidth = rect.width;
                signaturePosition.pdfDisplayHeight = rect.height;
            }
        }
        
        // 标注框拖拽和缩放
        signatureMarker.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('marker-handle')) {
                // 开始缩放
                e.preventDefault();
                markerResizing = true;
                resizeHandle = e.target.className.replace('marker-handle ', '').trim();
                markerStartX = e.clientX;
                markerStartY = e.clientY;
                initDisplaySize();
                markerStartPos = {
                    x: signaturePosition.x,
                    y: signaturePosition.y,
                    width: signaturePosition.width,
                    height: signaturePosition.height,
                    pdfDisplayWidth: signaturePosition.pdfDisplayWidth,
                    pdfDisplayHeight: signaturePosition.pdfDisplayHeight
                };
            } else if (e.target === signatureMarker) {
                // 开始拖动
                e.preventDefault();
                markerDragging = true;
                markerStartX = e.clientX;
                markerStartY = e.clientY;
                initDisplaySize();
                markerStartPos = {
                    x: signaturePosition.x,
                    y: signaturePosition.y,
                    pdfDisplayWidth: signaturePosition.pdfDisplayWidth,
                    pdfDisplayHeight: signaturePosition.pdfDisplayHeight
                };
            }
        });
        
        signatureMarker.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('marker-handle')) {
                e.preventDefault();
                markerResizing = true;
                resizeHandle = e.target.className.replace('marker-handle ', '').trim();
                markerStartX = e.touches[0].clientX;
                markerStartY = e.touches[0].clientY;
                initDisplaySize();
                markerStartPos = {
                    x: signaturePosition.x,
                    y: signaturePosition.y,
                    width: signaturePosition.width,
                    height: signaturePosition.height,
                    pdfDisplayWidth: signaturePosition.pdfDisplayWidth,
                    pdfDisplayHeight: signaturePosition.pdfDisplayHeight
                };
            } else if (e.target === signatureMarker) {
                e.preventDefault();
                markerDragging = true;
                markerStartX = e.touches[0].clientX;
                markerStartY = e.touches[0].clientY;
                initDisplaySize();
                markerStartPos = {
                    x: signaturePosition.x,
                    y: signaturePosition.y,
                    pdfDisplayWidth: signaturePosition.pdfDisplayWidth,
                    pdfDisplayHeight: signaturePosition.pdfDisplayHeight
                };
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            if (markerDragging) {
                const dx = (e.clientX - markerStartX) / pageScale;
                const dy = -(e.clientY - markerStartY) / pageScale;
                signaturePosition.x = markerStartPos.x + dx;
                signaturePosition.y = markerStartPos.y + dy;
                updateSignatureMarker();
            } else if (markerResizing) {
                const dx = (e.clientX - markerStartX) / pageScale;
                const dy = -(e.clientY - markerStartY) / pageScale;
                const minSize = 30;
                
                if (resizeHandle.includes('e')) {
                    signaturePosition.width = Math.max(minSize, markerStartPos.width + dx);
                }
                if (resizeHandle.includes('w')) {
                    const newWidth = Math.max(minSize, markerStartPos.width - dx);
                    signaturePosition.x = markerStartPos.x + dx;
                    signaturePosition.width = newWidth;
                }
                if (resizeHandle.includes('s')) {
                    signaturePosition.height = Math.max(minSize, markerStartPos.height + dy);
                }
                if (resizeHandle.includes('n')) {
                    const newHeight = Math.max(minSize, markerStartPos.height - dy);
                    signaturePosition.y = markerStartPos.y + dy;
                    signaturePosition.height = newHeight;
                }
                updateSignatureMarker();
            }
        });
        
        document.addEventListener('touchmove', (e) => {
            if (markerDragging && e.touches.length === 1) {
                const dx = (e.touches[0].clientX - markerStartX) / pageScale;
                const dy = -(e.touches[0].clientY - markerStartY) / pageScale;
                signaturePosition.x = markerStartPos.x + dx;
                signaturePosition.y = markerStartPos.y + dy;
                updateSignatureMarker();
            } else if (markerResizing && e.touches.length === 1) {
                const dx = (e.touches[0].clientX - markerStartX) / pageScale;
                const dy = -(e.touches[0].clientY - markerStartY) / pageScale;
                const minSize = 30;
                
                if (resizeHandle.includes('e')) {
                    signaturePosition.width = Math.max(minSize, markerStartPos.width + dx);
                }
                if (resizeHandle.includes('w')) {
                    const newWidth = Math.max(minSize, markerStartPos.width - dx);
                    signaturePosition.x = markerStartPos.x + dx;
                    signaturePosition.width = newWidth;
                }
                if (resizeHandle.includes('s')) {
                    signaturePosition.height = Math.max(minSize, markerStartPos.height + dy);
                }
                if (resizeHandle.includes('n')) {
                    const newHeight = Math.max(minSize, markerStartPos.height - dy);
                    signaturePosition.y = markerStartPos.y + dy;
                    signaturePosition.height = newHeight;
                }
                updateSignatureMarker();
            }
        });
        
        document.addEventListener('mouseup', () => { markerDragging = false; markerResizing = false; });
        document.addEventListener('touchend', () => { markerDragging = false; markerResizing = false; });
        
        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
                renderPage(currentPage);
            }
        });
        
        document.getElementById('next-page').addEventListener('click', () => {
            if (currentPage < totalPages) {
                currentPage++;
                document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
                renderPage(currentPage);
            }
        });
        
        // 签字画布
        let savedSignatureData = null;  // 保存签名数据
        let signatureImageData = null;   // 保存签名为Image对象
        
        function resizeSignatureCanvas() {
            // 保存当前签名 - 在resize之前保存
            const wrapper = document.querySelector('.signature-canvas-wrapper');
            const oldWidth = signatureCanvas.style.width;
            const oldHeight = signatureCanvas.style.height;
            
            // 获取当前签名图像数据
            if (hasSignature) {
                savedSignatureData = signatureCanvas.toDataURL('image/png');
            }
            
            const rect = wrapper.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            
            signatureCanvas.width = rect.width * dpr;
            signatureCanvas.height = rect.height * dpr;
            signatureCanvas.style.width = rect.width + 'px';
            signatureCanvas.style.height = rect.height + 'px';
            
            signatureCtx.scale(dpr, dpr);
            signatureCtx.lineCap = 'round';
            signatureCtx.lineJoin = 'round';
            
            // 恢复签名
            if (savedSignatureData) {
                const img = new Image();
                img.onload = () => {
                    signatureCtx.drawImage(img, 0, 0, rect.width, rect.height);
                };
                img.src = savedSignatureData;
                hasSignature = true;
                signaturePlaceholder.style.display = 'none';
                submitBtn.disabled = false;
            }
        }
        
        resizeSignatureCanvas();
        
        // 使用 orientationchange 事件监听屏幕旋转
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeSignatureCanvas, 100);
        });
        window.addEventListener('resize', () => {
            resizeSignatureCanvas();
        });
        
        // 辅助函数：将 data URL 转换为 Uint8Array
        function dataURLToUint8Array(dataURL) {
            const base64 = dataURL.split(',')[1];
            const binaryString = atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes;
        }
        
        // 辅助函数：将 ArrayBuffer 转换为 Base64
        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }
        
        function getPos(e) {
            const rect = signatureCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }
        
        function startDraw(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
            
            hasSignature = true;
            signaturePlaceholder.style.display = 'none';
            submitBtn.disabled = false;
        }
        
        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            const pos = getPos(e);
            signatureCtx.strokeStyle = strokeColor;
            signatureCtx.lineWidth = strokeWidth;
            signatureCtx.beginPath();
            signatureCtx.moveTo(lastX, lastY);
            signatureCtx.lineTo(pos.x, pos.y);
            signatureCtx.stroke();
            
            lastX = pos.x;
            lastY = pos.y;
        }
        
        function stopDraw() {
            isDrawing = false;
        }
        
        signatureCanvas.addEventListener('mousedown', startDraw);
        signatureCanvas.addEventListener('mousemove', draw);
        signatureCanvas.addEventListener('mouseup', stopDraw);
        signatureCanvas.addEventListener('mouseout', stopDraw);
        signatureCanvas.addEventListener('touchstart', startDraw);
        signatureCanvas.addEventListener('touchmove', draw);
        signatureCanvas.addEventListener('touchend', stopDraw);
        
        // 颜色选择
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                strokeColor = btn.dataset.color;
            });
        });
        
        // 粗细调整
        document.getElementById('brush-size').addEventListener('input', (e) => {
            strokeWidth = parseInt(e.target.value);
        });
        
        document.getElementById('box-size').addEventListener('input', (e) => {
            const size = parseInt(e.target.value);
            if (signaturePosition) {
                signaturePosition.width = size;
                signaturePosition.height = Math.round(size / 3);
                // 保存当前显示尺寸
                const rect = pdfCanvas.getBoundingClientRect();
                if (!signaturePosition.pdfDisplayWidth) {
                    signaturePosition.pdfDisplayWidth = rect.width;
                    signaturePosition.pdfDisplayHeight = rect.height;
                }
                updateSignatureMarker();
            }
        });
        
        // 清除
        document.getElementById('clear-btn').addEventListener('click', () => {
            const rect = signatureCanvas.getBoundingClientRect();
            signatureCtx.clearRect(0, 0, rect.width, rect.height);
            hasSignature = false;
            signaturePlaceholder.style.display = 'block';
            submitBtn.disabled = true;
        });
        
        // 提交
        submitBtn.addEventListener('click', async () => {
            if (!hasSignature) return;
            
            showLoading('正在保存签字...');
            
            try {
                // 获取签字图片
                const signatureDataUrl = signatureCanvas.toDataURL('image/png');
                
                // 准备位置信息
                const positionData = signaturePosition ? {
                    page: signaturePosition.page,
                    x: signaturePosition.x,
                    y: signaturePosition.y,
                    width: signaturePosition.width,
                    height: signaturePosition.height
                } : null;
                
                console.log('准备提交，位置信息:', positionData, 'PDF大小:', pdfBytes ? pdfBytes.length : 0);
                
                // 准备要发送的数据
                const submitData = {
                    token: jwtToken,
                    signature: signatureDataUrl,
                    position: positionData
                };
                
                // 如果有PDF数据，转换为base64发送
                if (pdfBytes && pdfBytes.length > 0) {
                    submitData.pdf = arrayBufferToBase64(pdfBytes);
                    console.log('PDF已附加，大小:', pdfBytes.length);
                }
                
                // 发送签字图片和位置信息到服务端
                const response = await fetch('/api/sign/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(submitData)
                });
                
                console.log('收到响应:', response.status);
                const result = await response.json();
                console.log('响应内容:', result);
                
                if (result.success) {
                    hideLoading();
                    success.style.display = 'flex';
                    // 显示下载链接
                    const downloadLink = document.getElementById('download-link');
                    if (downloadLink && result.download_url) {
                        downloadLink.href = result.download_url;
                        downloadLink.style.display = 'inline-block';
                    }
                } else {
                    throw new Error(result.error || '提交失败');
                }
            } catch (err) {
                hideLoading();
                showError('保存失败: ' + err.message);
                console.error('错误详情:', err);
            }
        });
        
        async function addSignatureToPdf(pdfBytesInput, signatureDataUrl) {
            const { PDFDocument } = PDFLib;
            // 创建 PDF 数据的副本
            const pdfBytesCopy = new Uint8Array(pdfBytesInput);
            const pdfDoc = await PDFDocument.load(pdfBytesCopy);
            const pages = pdfDoc.getPages();
            
            // 加载签字图片 - 直接从 data URL 转换
            const signatureImageBytes = dataURLToUint8Array(signatureDataUrl);
            const signatureImage = await pdfDoc.embedPng(signatureImageBytes);
            
            // 确定签字位置
            let targetPage = pages[0];
            let x = 50;
            let y = 300;
            let width = 150;
            let height = 50;
            
            if (signaturePosition) {
                // 使用用户选择的位置
                const pageIndex = signaturePosition.page - 1;
                if (pageIndex >= 0 && pageIndex < pages.length) {
                    targetPage = pages[pageIndex];
                }
                x = signaturePosition.x;
                y = signaturePosition.y;
                width = signaturePosition.width;
                height = signaturePosition.height;
            }
            
            // 绘制签字
            targetPage.drawImage(signatureImage, {
                x: x,
                y: y,
                width: width,
                height: height,
            });
            
            return await pdfDoc.save();
        }
        
        function showLoading(text) {
            document.getElementById('loading-text').textContent = text;
            loading.style.display = 'flex';
        }
        
        function hideLoading() {
            loading.style.display = 'none';
        }
        
        function showError(msg) {
            error.textContent = msg;
            error.style.display = 'block';
        }
        
        // 二维码功能
        let qrGenerated = false;
        function showQRModal() {
            const modal = document.getElementById('qr-modal');
            const qrContainer = document.getElementById('qrcode');
            modal.classList.add('show');
            
            if (!qrGenerated) {
                qrContainer.innerHTML = '';
                new QRCode(qrContainer, {
                    text: window.location.href,
                    width: 200,
                    height: 200,
                    colorDark: '#667eea',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
                qrGenerated = true;
            }
        }
        
        document.getElementById('qr-btn').addEventListener('click', showQRModal);
        document.getElementById('qr-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('qr-modal')) {
                document.getElementById('qr-modal').classList.remove('show');
            }
        });
        
        init();
    </script>
</body>
</html>
