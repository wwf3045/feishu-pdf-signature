<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 签字工具 - 配置</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #1a1a2e;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .help {
            color: #666;
            font-size: 13px;
            margin-top: 4px;
        }
        .section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        .code {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            color: #333;
            margin-top: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 PDF 签字工具</h1>
        <p class="subtitle">配置多维表格连接信息</p>
        
        {% if success %}
        <div class="success">✅ 配置保存成功！</div>
        {% endif %}
        
        <form method="post">
            <div class="form-group">
                <label for="app_token">多维表格 App Token</label>
                <input type="text" id="app_token" name="app_token" value="{{ config.app_token or '' }}" placeholder="例如：bascnxxxxxxxxxxxx">
                <p class="help">从多维表格 URL 中的 app_token</p>
            </div>
            
            <div class="form-group">
                <label for="table_id">数据表 ID</label>
                <input type="text" id="table_id" name="table_id" value="{{ config.table_id or '' }}" placeholder="例如：tblxxxxxxxxxxxx">
                <p class="help">要操作的数据表 ID</p>
            </div>
            
            <div class="form-group">
                <label for="pdf_field">PDF 文件字段名</label>
                <input type="text" id="pdf_field" name="pdf_field" value="{{ config.pdf_field or '' }}" placeholder="例如：原始PDF">
                <p class="help">存储待签字 PDF 的字段名称</p>
            </div>
            
            <div class="form-group">
                <label for="signed_pdf_field">签字后 PDF 字段名</label>
                <input type="text" id="signed_pdf_field" name="signed_pdf_field" value="{{ config.signed_pdf_field or '' }}" placeholder="例如：已签字PDF">
                <p class="help">存储签字后 PDF 的字段名称</p>
            </div>
            
            <div class="form-group">
                <label for="signer_field">签字人字段名（可选）</label>
                <input type="text" id="signer_field" name="signer_field" value="{{ config.signer_field or '' }}" placeholder="例如：签字人">
                <p class="help">记录签字人姓名的字段（可选）</p>
            </div>
            
            <button type="submit" class="btn">保存配置</button>
        </form>
        
        <div class="section">
            <h3 style="margin-bottom:12px;">API 使用说明</h3>
            <p class="help">生成签字链接的 API:</p>
            <div class="code">
POST /api/generate-link<br>
{<br>
&nbsp;&nbsp;"record_id": "记录ID",<br>
&nbsp;&nbsp;"pdf_url": "PDF下载地址"<br>
}
            </div>
        </div>
    </div>
</body>
</html>
